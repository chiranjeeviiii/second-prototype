<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generate Poster</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
font-family:sans-serif;
}

canvas{
max-width:100%;
border-radius:10px;
background:white;
}
</style>

</head>

<body class="bg-blue-50">

<div class="max-w-md mx-auto p-4">

<h2 class="text-2xl font-bold text-center mb-4">
Create Your Poster
</h2>

<label class="block mt-3">Upload Photo</label>
<input type="file" id="photoInput" accept="image/*" class="w-full p-2 border rounded">

<label class="block mt-3">Enter Name</label>
<input type="text" id="nameInput" class="w-full p-2 border rounded">

<label class="block mt-3">Select Achievement</label>
<select id="achievementSelect" class="w-full p-2 border rounded"></select>

<button id="generateBtn"
class="w-full bg-blue-600 text-white p-3 rounded mt-4">
Generate Poster
</button>

<div class="mt-6 text-center">
<canvas id="canvas" width="1080" height="1080"></canvas>
</div>

<button id="downloadBtn"
class="w-full bg-green-600 text-white p-3 rounded mt-4">
Download Poster
</button>

</div>

<script src="js/app.js"></script>
<script src="js/generator.js"></script>

</body>
</html>
