<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCM Poster Maker</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap');

body{
font-family:'Inter',sans-serif;
}

.logo-img{
height:50px;
width:auto;
}

.text-rcm-blue{color:#1e56a0;}
.text-poster-red{color:#e11d48;}

.text-club-green{color:#16a34a;}
.text-achiever-orange{color:#ea580c;}
</style>

</head>

<body class="bg-blue-50 m-0">

<header class="w-full bg-slate-50 border-b border-gray-200 py-4 px-6 md:px-12">

<div class="max-w-7xl mx-auto flex items-center gap-4">

<img src="assets/logo.png"
alt="RCM Logo"
class="logo-img"
onerror="this.src='https://placehold.co/100x100?text=RCM'">

<h1 class="text-2xl md:text-4xl font-extrabold tracking-tight whitespace-nowrap">
<span class="text-rcm-blue">RCM</span>
<span class="text-poster-red">poster maker</span>
</h1>

</div>

</header>

<main class="min-h-[80vh] flex flex-col items-center justify-center p-8 text-center gap-8">

<a href="generator.html?type=club"
class="block text-4xl md:text-7xl font-black text-club-green uppercase tracking-tighter hover:scale-105 transition">
Purchasing club
</a>

<a href="generator.html?type=pin"
class="block text-4xl md:text-7xl font-black text-achiever-orange uppercase tracking-tighter hover:scale-105 transition">
Pin Achiever
</a>

</main>

</body>
</html>
