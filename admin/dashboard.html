<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-blue-50">

<script>
if(localStorage.getItem("admin") !== "true"){
window.location.href="login.html";
}
</script>

<div class="max-w-md mx-auto p-6">

<h2 class="text-2xl font-bold text-center mb-6">
Admin Dashboard
</h2>

<label class="block mt-3">Upload Frame Image</label>
<input type="file" id="frameFile" class="w-full p-2 border rounded">

<label class="block mt-3">Template ID</label>
<input type="text" id="frameId" class="w-full p-2 border rounded">

<label class="block mt-3">Title</label>
<input type="text" id="title" class="w-full p-2 border rounded">

<label class="block mt-3">Type (club or pin)</label>
<input type="text" id="type" class="w-full p-2 border rounded">

<label class="block mt-3">Photo X</label>
<input type="number" id="photoX" class="w-full p-2 border rounded">

<label class="block mt-3">Photo Y</label>
<input type="number" id="photoY" class="w-full p-2 border rounded">

<label class="block mt-3">Photo Size</label>
<input type="number" id="photoSize" class="w-full p-2 border rounded">

<label class="block mt-3">Name X</label>
<input type="number" id="nameX" class="w-full p-2 border rounded">

<label class="block mt-3">Name Y</label>
<input type="number" id="nameY" class="w-full p-2 border rounded">

<label class="block mt-3">Font Size</label>
<input type="number" id="fontSize" class="w-full p-2 border rounded">

<button
onclick="generateJSON()"
class="w-full bg-blue-600 text-white p-3 rounded mt-4">
Generate Frame JSON
</button>

<textarea
id="output"
class="w-full mt-4 p-2 border rounded h-40">
</textarea>

<button
onclick="logout()"
class="w-full bg-red-500 text-white p-3 rounded mt-4">
Logout
</button>

</div>

<script src="admin.js"></script>

</body>
</html>
